      <rect x="-6" y="-52" width="12" height="16" rx="2" transform="rotate(150)" />
      <rect x="-6" y="-52" width="12" height="16" rx="2" transform="rotate(180)" />
      <rect x="-6" y="-52" width="12" height="16" rx="2" transform="rotate(210)" />
